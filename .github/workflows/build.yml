name: Build Swiss QR Scanner – alle Plattformen

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JAVA_VERSION: '21'

jobs:

  # ════════════════════════════════════════════════════════
  #  Windows → SwissQRScanner.exe
  # ════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Java 21 mit JavaFX
        uses: actions/setup-java@v4.7.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Maven Build (Fat JAR)
        run: mvn -B package -q

      - name: Native EXE mit jpackage
        run: |
          jpackage `
            --input target `
            --name SwissQRScanner `
            --main-jar SwissQRScanner-1.0.0.jar `
            --main-class ch.qrscanner.Main `
            --type exe `
            --win-console `
            --app-version 1.0.0 `
            --dest dist-win
        shell: pwsh

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: SwissQRScanner-Windows
          path: dist-win\*.exe
          retention-days: 30

  # ════════════════════════════════════════════════════════
  #  macOS → SwissQRScanner.dmg
  # ════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Java 21 mit JavaFX
        uses: actions/setup-java@v4.7.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Maven Build (Fat JAR)
        run: mvn -B package -q

      - name: Native App mit jpackage
        run: |
          jpackage \
            --input target \
            --name SwissQRScanner \
            --main-jar SwissQRScanner-1.0.0.jar \
            --main-class ch.qrscanner.Main \
            --type dmg \
            --app-version 1.0.0 \
            --dest dist-mac

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: SwissQRScanner-macOS
          path: dist-mac/*.dmg
          retention-days: 30

  # ════════════════════════════════════════════════════════
  #  Linux → SwissQRScanner.deb
  # ════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Java 21 mit JavaFX
        uses: actions/setup-java@v4.7.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Maven Build (Fat JAR)
        run: mvn -B package -q

      - name: Native Paket mit jpackage
        run: |
          jpackage \
            --input target \
            --name SwissQRScanner \
            --main-jar SwissQRScanner-1.0.0.jar \
            --main-class ch.qrscanner.Main \
            --type deb \
            --app-version 1.0.0 \
            --dest dist-linux

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: SwissQRScanner-Linux
          path: dist-linux/*.deb
          retention-days: 30
